specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Salesforce Einstein
providerId: salesforce-einstein
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Artificial Intelligence
  - Computer Vision
  - CRM
  - Machine Learning
  - Salesforce
description: 'Salesforce Einstein is the AI layer of the Salesforce platform, spanning predictive scoring,
  language, vision, the Trust Layer, Einstein Copilot, and Prompt / Model / Copilot Builder. Einstein
  capabilities are sold as add-ons to a Salesforce edition, with bundling that varies by Cloud (Sales
  / Service / Marketing / Industry) and add-on suite (Einstein 1, Sales / Service AI). Salesforce''s public
  pricing pages were not retrievable for this run, so per-feature add-on prices are not fabricated below.'
sources:
  - https://www.salesforce.com/products/einstein-ai-solutions/pricing/
notes: Salesforce.com pricing pages return 403 to scraping. Real Einstein pricing is bundled into Salesforce
  edition / Cloud / add-on contracts and varies by region and seat count. This artifact is intentionally
  a single Contact Sales plan rather than a fabricated tier breakdown.
plans:
  - id: salesforce-einstein-contact-sales
    name: Contact Sales
    type: enterprise
    description: Einstein AI capabilities as add-ons to a Salesforce edition. Pricing depends on the underlying
      Cloud (Sales / Service / Marketing / Industry), the chosen Einstein add-on (Einstein 1, Sales AI,
      Service AI), and seat count.
    entries:
      - label: Einstein Add-On Subscription
        name: einstein_addon
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Einstein Trust Layer
      - name: Einstein Copilot
      - name: Prompt Builder / Model Builder / Copilot Builder
      - name: Einstein for Sales (lead / opportunity scoring, activity capture)
      - name: Einstein for Service (case classification, recommendations)
      - name: Einstein Vision and Language APIs
      - name: API access subject to per-org Salesforce 24-hour API allowance
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
