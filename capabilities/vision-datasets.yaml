naftiko: 1.0.0-alpha2
info:
  label: Salesforce Einstein Vision API — Datasets
  description: 'Salesforce Einstein Vision API — Datasets. 4 operations. Lead operation: Salesforce Einstein List datasets.
    Self-contained Naftiko capability covering one Salesforce Einstein business surface.'
  tags:
  - Salesforce Einstein
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SALESFORCE_EINSTEIN_API_KEY: SALESFORCE_EINSTEIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: vision-datasets
    baseUri: https://api.einstein.ai/v2/vision
    description: Salesforce Einstein Vision API — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: datasets
      path: /datasets
      operations:
      - name: listdatasets
        method: GET
        description: Salesforce Einstein List datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: Zero-based offset of the first dataset to return.
        - name: count
          in: query
          type: integer
          description: Maximum number of datasets to return.
      - name: createdataset
        method: POST
        description: Salesforce Einstein Create a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: datasets-datasetId
      path: /datasets/{datasetId}
      operations:
      - name: getdataset
        method: GET
        description: Salesforce Einstein Get a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletedataset
        method: DELETE
        description: Salesforce Einstein Delete a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SALESFORCE_EINSTEIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: vision-datasets-rest
    port: 8080
    description: REST adapter for Salesforce Einstein Vision API — Datasets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/datasets
      name: datasets
      description: REST surface for datasets.
      operations:
      - method: GET
        name: listdatasets
        description: Salesforce Einstein List datasets
        call: vision-datasets.listdatasets
        with:
          offset: rest.offset
          count: rest.count
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdataset
        description: Salesforce Einstein Create a dataset
        call: vision-datasets.createdataset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets/{datasetid}
      name: datasets-datasetid
      description: REST surface for datasets-datasetId.
      operations:
      - method: GET
        name: getdataset
        description: Salesforce Einstein Get a dataset
        call: vision-datasets.getdataset
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedataset
        description: Salesforce Einstein Delete a dataset
        call: vision-datasets.deletedataset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vision-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Salesforce Einstein Vision API — Datasets. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: salesforce-einstein-list-datasets
      description: Salesforce Einstein List datasets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vision-datasets.listdatasets
      with:
        offset: tools.offset
        count: tools.count
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-create-dataset
      description: Salesforce Einstein Create a dataset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vision-datasets.createdataset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-get-dataset
      description: Salesforce Einstein Get a dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vision-datasets.getdataset
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-delete-dataset
      description: Salesforce Einstein Delete a dataset
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: vision-datasets.deletedataset
      outputParameters:
      - type: object
        mapping: $.
