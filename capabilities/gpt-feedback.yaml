naftiko: 1.0.0-alpha2
info:
  label: Salesforce Einstein GPT API — Feedback
  description: 'Salesforce Einstein GPT API — Feedback. 1 operations. Lead operation: Salesforce Einstein Submit feedback
    on generated content. Self-contained Naftiko capability covering one Salesforce Einstein business surface.'
  tags:
  - Salesforce Einstein
  - Feedback
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SALESFORCE_EINSTEIN_API_KEY: SALESFORCE_EINSTEIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: gpt-feedback
    baseUri: https://{instance}.salesforce.com/services/data/v58.0
    description: Salesforce Einstein GPT API — Feedback business capability. Self-contained, no shared references.
    resources:
    - name: einstein-llm-feedback
      path: /einstein/llm/feedback
      operations:
      - name: submitfeedback
        method: POST
        description: Salesforce Einstein Submit feedback on generated content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SALESFORCE_EINSTEIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: gpt-feedback-rest
    port: 8080
    description: REST adapter for Salesforce Einstein GPT API — Feedback. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/einstein/llm/feedback
      name: einstein-llm-feedback
      description: REST surface for einstein-llm-feedback.
      operations:
      - method: POST
        name: submitfeedback
        description: Salesforce Einstein Submit feedback on generated content
        call: gpt-feedback.submitfeedback
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gpt-feedback-mcp
    port: 9090
    transport: http
    description: MCP adapter for Salesforce Einstein GPT API — Feedback. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: salesforce-einstein-submit-feedback-generated
      description: Salesforce Einstein Submit feedback on generated content
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gpt-feedback.submitfeedback
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
