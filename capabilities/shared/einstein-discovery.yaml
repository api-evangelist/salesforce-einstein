naftiko: "1.0.0-alpha1"

info:
  label: "Salesforce Einstein Discovery API"
  description: >-
    Advanced analytics and automated insights using Einstein Discovery. Manage
    stories, prediction models, dashboards, and lenses. Get AI-powered
    predictions and statistical analysis from Salesforce Analytics data.
  tags:
    - Analytics
    - Artificial Intelligence
    - Business Intelligence
    - Machine Learning
    - Predictive Analytics
    - Salesforce Einstein
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SALESFORCE_OAUTH2_TOKEN: SALESFORCE_OAUTH2_TOKEN
      SALESFORCE_INSTANCE_URL: SALESFORCE_INSTANCE_URL

capability:
  consumes:
    - type: http
      namespace: einstein-discovery
      baseUri: "{{env.SALESFORCE_INSTANCE_URL}}/services/data/v58.0"
      description: "Salesforce Einstein Discovery (Wave Analytics) REST API."
      authentication:
        type: bearer
        token: "{{env.SALESFORCE_OAUTH2_TOKEN}}"
      resources:
        - name: stories
          path: /wave/stories
          description: "Einstein Discovery stories for AI-powered analytics."
          operations:
            - name: list-stories
              method: GET
              description: "List all Einstein Discovery stories."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Search query to filter stories by name."
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of stories to return per page."
              outputRawFormat: json
              outputParameters:
                - name: stories
                  type: object
                  value: "$."
            - name: create-story
              method: POST
              description: "Create a new Einstein Discovery story from a dataset."
              outputRawFormat: json
              outputParameters:
                - name: story
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  datasetId: "{{tools.datasetId}}"
                  label: "{{tools.label}}"
            - name: get-story
              method: GET
              description: "Get details of a specific Einstein Discovery story."
              inputParameters:
                - name: storyId
                  in: path
                  type: string
                  required: true
                  description: "Story ID."
              outputRawFormat: json
              outputParameters:
                - name: story
                  type: object
                  value: "$."
            - name: delete-story
              method: DELETE
              description: "Delete an Einstein Discovery story."
              inputParameters:
                - name: storyId
                  in: path
                  type: string
                  required: true
                  description: "Story ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-story-stats
              method: GET
              description: "Get statistical insights from an Einstein Discovery story."
              inputParameters:
                - name: storyId
                  in: path
                  type: string
                  required: true
                  description: "Story ID."
              outputRawFormat: json
              outputParameters:
                - name: stats
                  type: object
                  value: "$."

        - name: models
          path: /wave/models
          description: "Einstein Discovery prediction models."
          operations:
            - name: list-models
              method: GET
              description: "List all Einstein Discovery prediction models."
              inputParameters:
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of models to return per page."
              outputRawFormat: json
              outputParameters:
                - name: models
                  type: object
                  value: "$."
            - name: get-model
              method: GET
              description: "Get a specific Einstein Discovery prediction model."
              inputParameters:
                - name: modelId
                  in: path
                  type: string
                  required: true
                  description: "Model ID."
              outputRawFormat: json
              outputParameters:
                - name: model
                  type: object
                  value: "$."

        - name: dashboards
          path: /wave/dashboards
          description: "Einstein Analytics dashboards."
          operations:
            - name: list-dashboards
              method: GET
              description: "List all Einstein Analytics dashboards."
              inputParameters:
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of dashboards per page."
              outputRawFormat: json
              outputParameters:
                - name: dashboards
                  type: object
                  value: "$."
            - name: get-dashboard
              method: GET
              description: "Get a specific analytics dashboard."
              inputParameters:
                - name: dashboardId
                  in: path
                  type: string
                  required: true
                  description: "Dashboard ID."
              outputRawFormat: json
              outputParameters:
                - name: dashboard
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: einstein-discovery-api
      resources:
        - path: /v1/stories
          name: stories
          operations:
            - method: GET
              name: list-stories
              description: "List Einstein Discovery stories."
              call: "einstein-discovery.list-stories"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/models
          name: models
          operations:
            - method: GET
              name: list-models
              description: "List Einstein Discovery prediction models."
              call: "einstein-discovery.list-models"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dashboards
          name: dashboards
          operations:
            - method: GET
              name: list-dashboards
              description: "List Einstein Analytics dashboards."
              call: "einstein-discovery.list-dashboards"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: einstein-discovery-mcp
      transport: http
      tools:
        - name: list-discovery-stories
          description: "List all Einstein Discovery stories for AI-powered analytics."
          hints:
            readOnly: true
            idempotent: true
          call: "einstein-discovery.list-stories"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-story-stats
          description: "Get statistical insights and predictions from an Einstein Discovery story."
          hints:
            readOnly: true
            idempotent: true
          call: "einstein-discovery.get-story-stats"
          with:
            storyId: "tools.storyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-discovery-models
          description: "List all Einstein Discovery prediction models."
          hints:
            readOnly: true
            idempotent: true
          call: "einstein-discovery.list-models"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-analytics-dashboards
          description: "List Einstein Analytics dashboards."
          hints:
            readOnly: true
            idempotent: true
          call: "einstein-discovery.list-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
