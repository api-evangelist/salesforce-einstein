naftiko: 1.0.0-alpha2
info:
  label: Salesforce Einstein Discovery API — Models
  description: 'Salesforce Einstein Discovery API — Models. 3 operations. Lead operation: Salesforce Einstein List prediction
    models. Self-contained Naftiko capability covering one Salesforce Einstein business surface.'
  tags:
  - Salesforce Einstein
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SALESFORCE_EINSTEIN_API_KEY: SALESFORCE_EINSTEIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: discovery-models
    baseUri: https://{instance}.salesforce.com/services/data/v58.0
    description: Salesforce Einstein Discovery API — Models business capability. Self-contained, no shared references.
    resources:
    - name: wave-models
      path: /wave/models
      operations:
      - name: listmodels
        method: GET
        description: Salesforce Einstein List prediction models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pageSize
          in: query
          type: integer
        - name: page
          in: query
          type: string
    - name: wave-models-modelId
      path: /wave/models/{modelId}
      operations:
      - name: getmodel
        method: GET
        description: Salesforce Einstein Get a prediction model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletemodel
        method: DELETE
        description: Salesforce Einstein Delete a prediction model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SALESFORCE_EINSTEIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: discovery-models-rest
    port: 8080
    description: REST adapter for Salesforce Einstein Discovery API — Models. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wave/models
      name: wave-models
      description: REST surface for wave-models.
      operations:
      - method: GET
        name: listmodels
        description: Salesforce Einstein List prediction models
        call: discovery-models.listmodels
        with:
          pageSize: rest.pageSize
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/wave/models/{modelid}
      name: wave-models-modelid
      description: REST surface for wave-models-modelId.
      operations:
      - method: GET
        name: getmodel
        description: Salesforce Einstein Get a prediction model
        call: discovery-models.getmodel
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemodel
        description: Salesforce Einstein Delete a prediction model
        call: discovery-models.deletemodel
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: discovery-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for Salesforce Einstein Discovery API — Models. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: salesforce-einstein-list-prediction-models
      description: Salesforce Einstein List prediction models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: discovery-models.listmodels
      with:
        pageSize: tools.pageSize
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-get-prediction-model
      description: Salesforce Einstein Get a prediction model
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: discovery-models.getmodel
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-delete-prediction-model
      description: Salesforce Einstein Delete a prediction model
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: discovery-models.deletemodel
      outputParameters:
      - type: object
        mapping: $.
