naftiko: 1.0.0-alpha2
info:
  label: Salesforce Einstein Language API — Models
  description: 'Salesforce Einstein Language API — Models. 5 operations. Lead operation: Salesforce Einstein List models for
    a dataset. Self-contained Naftiko capability covering one Salesforce Einstein business surface.'
  tags:
  - Salesforce Einstein
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SALESFORCE_EINSTEIN_API_KEY: SALESFORCE_EINSTEIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: language-models
    baseUri: https://api.einstein.ai/v2/language
    description: Salesforce Einstein Language API — Models business capability. Self-contained, no shared references.
    resources:
    - name: datasets-datasetId-models
      path: /datasets/{datasetId}/models
      operations:
      - name: listmodelsfordataset
        method: GET
        description: Salesforce Einstein List models for a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: models-modelId
      path: /models/{modelId}
      operations:
      - name: getmodel
        method: GET
        description: Salesforce Einstein Get model details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletemodel
        method: DELETE
        description: Salesforce Einstein Delete a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: retrain
      path: /retrain
      operations:
      - name: retrainmodel
        method: POST
        description: Salesforce Einstein Retrain a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: train
      path: /train
      operations:
      - name: trainmodel
        method: POST
        description: Salesforce Einstein Train a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SALESFORCE_EINSTEIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: language-models-rest
    port: 8080
    description: REST adapter for Salesforce Einstein Language API — Models. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/datasets/{datasetid}/models
      name: datasets-datasetid-models
      description: REST surface for datasets-datasetId-models.
      operations:
      - method: GET
        name: listmodelsfordataset
        description: Salesforce Einstein List models for a dataset
        call: language-models.listmodelsfordataset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/models/{modelid}
      name: models-modelid
      description: REST surface for models-modelId.
      operations:
      - method: GET
        name: getmodel
        description: Salesforce Einstein Get model details
        call: language-models.getmodel
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemodel
        description: Salesforce Einstein Delete a model
        call: language-models.deletemodel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/retrain
      name: retrain
      description: REST surface for retrain.
      operations:
      - method: POST
        name: retrainmodel
        description: Salesforce Einstein Retrain a model
        call: language-models.retrainmodel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/train
      name: train
      description: REST surface for train.
      operations:
      - method: POST
        name: trainmodel
        description: Salesforce Einstein Train a model
        call: language-models.trainmodel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: language-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for Salesforce Einstein Language API — Models. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: salesforce-einstein-list-models-dataset
      description: Salesforce Einstein List models for a dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: language-models.listmodelsfordataset
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-get-model-details
      description: Salesforce Einstein Get model details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: language-models.getmodel
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-delete-model
      description: Salesforce Einstein Delete a model
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: language-models.deletemodel
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-retrain-model
      description: Salesforce Einstein Retrain a model
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: language-models.retrainmodel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-train-model
      description: Salesforce Einstein Train a model
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: language-models.trainmodel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
