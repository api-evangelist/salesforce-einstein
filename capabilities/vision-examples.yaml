naftiko: 1.0.0-alpha2
info:
  label: Salesforce Einstein Vision API — Examples
  description: 'Salesforce Einstein Vision API — Examples. 2 operations. Lead operation: Salesforce Einstein List examples
    in a dataset. Self-contained Naftiko capability covering one Salesforce Einstein business surface.'
  tags:
  - Salesforce Einstein
  - Examples
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SALESFORCE_EINSTEIN_API_KEY: SALESFORCE_EINSTEIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: vision-examples
    baseUri: https://api.einstein.ai/v2/vision
    description: Salesforce Einstein Vision API — Examples business capability. Self-contained, no shared references.
    resources:
    - name: datasets-datasetId-examples
      path: /datasets/{datasetId}/examples
      operations:
      - name: listexamples
        method: GET
        description: Salesforce Einstein List examples in a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
        - name: count
          in: query
          type: integer
        - name: source
          in: query
          type: string
          description: Filter by source type.
      - name: addexample
        method: POST
        description: Salesforce Einstein Add an example to a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SALESFORCE_EINSTEIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: vision-examples-rest
    port: 8080
    description: REST adapter for Salesforce Einstein Vision API — Examples. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/datasets/{datasetid}/examples
      name: datasets-datasetid-examples
      description: REST surface for datasets-datasetId-examples.
      operations:
      - method: GET
        name: listexamples
        description: Salesforce Einstein List examples in a dataset
        call: vision-examples.listexamples
        with:
          offset: rest.offset
          count: rest.count
          source: rest.source
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addexample
        description: Salesforce Einstein Add an example to a dataset
        call: vision-examples.addexample
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vision-examples-mcp
    port: 9090
    transport: http
    description: MCP adapter for Salesforce Einstein Vision API — Examples. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: salesforce-einstein-list-examples-dataset
      description: Salesforce Einstein List examples in a dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vision-examples.listexamples
      with:
        offset: tools.offset
        count: tools.count
        source: tools.source
      outputParameters:
      - type: object
        mapping: $.
    - name: salesforce-einstein-add-example-dataset
      description: Salesforce Einstein Add an example to a dataset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vision-examples.addexample
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
