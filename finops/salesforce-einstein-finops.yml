specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Salesforce Einstein
providerId: salesforce-einstein
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - CRM
  - AI
  - Salesforce
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for Salesforce Einstein: AI add-ons priced per Salesforce edition
  / Cloud / seat with generative features additionally bounded by per-add-on request budgets. The financial
  unit is the licensed user; the binding constraint for generative use cases is the Einstein generative
  request quota.'
sources:
  - https://www.salesforce.com/products/einstein-ai-solutions/pricing/
  - https://developer.salesforce.com/docs/atlas.en-us.salesforce_app_limits_cheatsheet.meta/salesforce_app_limits_cheatsheet/salesforce_app_limits_platform_api.htm
notes: Public pricing pages were not retrievable; concrete Einstein add-on prices and generative quotas
  could not be verified for this run.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Salesforce, Inc.
serviceCategory: AI / CRM
billingModel:
  pricingCategory: Subscription Add-On / Contact Sales
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Salesforce Einstein
  ServiceCategory: AI / CRM
  ProviderName: Salesforce
  PublisherName: Salesforce, Inc.
  InvoiceIssuerName: Salesforce, Inc.
  BillingCurrency: USD
meters:
  - name: einstein_seats
    unit: seat
    aggregation: max
    dimensions:
      - addon
      - cloud
  - name: generative_requests
    unit: request
    aggregation: sum
    dimensions:
      - feature
      - org
  - name: predictions
    unit: prediction
    aggregation: sum
    dimensions:
      - model
      - org
principles:
  - name: Visibility
    description: Track generative request consumption via the Einstein admin console and Trust Layer audit
      logs; track core API consumption via API Usage Last 7 Days; correlate with seat-level adoption metrics.
  - name: Allocation
    description: Allocate Einstein add-on cost by Cloud and business unit; tag Copilot / Prompt Builder
      generations by feature and use case so high-cost prompts can be attributed back to their owning
      product.
  - name: Optimization
    description: Tune prompt templates for token efficiency; cache deterministic outputs where Trust Layer
      policy allows; right-size add-on seats at renewal; retire low-adoption Einstein features rather
      than auto-renewing.
  - name: Accountability
    description: Salesforce CoE / AI lead owns Einstein adoption with finance; product owners are accountable
      for the Copilot / Prompt Builder workflows their teams introduce. Surface generative quota burn
      relative to budget.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
