specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Salesforce Einstein
providerId: salesforce-einstein
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - CRM
  - AI
  - Salesforce
  - Rate Limiting
description: Salesforce Einstein consumption is limited at two layers. Calls into the core platform APIs
  inherit the per-org 24-hour API request allowance scaled by edition + license count. Generative Einstein
  features (Copilot, Prompt Builder, Trust Layer) additionally meter against per-org / per-user generative
  request budgets defined per add-on SKU. Exact published numbers were not retrievable in this run; this
  artifact captures the model and points to Salesforce's published limits.
sources:
  - https://developer.salesforce.com/docs/atlas.en-us.salesforce_app_limits_cheatsheet.meta/salesforce_app_limits_cheatsheet/salesforce_app_limits_platform_api.htm
notes: Per-edition daily request limits and per-feature generative quotas were not retrievable; consult
  the Salesforce App Limits Cheatsheet and Einstein release notes from an authenticated browser session
  for current values.
responseCodes:
  throttled: 429
  apiLimitExceeded: 403
limits:
  - name: Per-org 24-hour API request allowance
    scope: org
    metric: requests_per_day
    limit: see Salesforce App Limits Cheatsheet (varies by edition + license count)
    notes: Einstein API calls into the core platform consume the same 24-hour bucket as REST / Bulk /
      Tooling.
  - name: Einstein generative request quota
    scope: org
    metric: requests_per_window
    limit: see Einstein add-on documentation (per-org / per-user budgets)
    notes: Copilot, Prompt Builder, and Trust Layer features have additional generative request budgets
      defined per add-on SKU.
  - name: Einstein Vision / Language predictions
    scope: account
    metric: predictions_per_month
    limit: see Einstein Platform Services documentation
    notes: Legacy Einstein Vision / Language APIs document monthly prediction allowances per plan.
policies:
  - name: Edition + license scaling
    description: Core API allowance scales with edition and license count.
  - name: Add-on quotas
    description: Generative Einstein features add their own quotas on top of the core allowance; exhaustion
      affects only generative endpoints.
  - name: Trust Layer governance
    description: The Einstein Trust Layer enforces masking, audit, and zero-retention policies that affect
      throughput characteristics of generative calls.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
